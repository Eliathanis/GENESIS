name: Test GENESIS Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Add Python dependencies here when needed
    
    - name: Run basic validation
      run: |
        echo "Validating project structure..."
        [ -f README.md ] && echo "✓ README.md exists" || exit 1
        [ -f LICENSE ] && echo "✓ LICENSE exists" || exit 1
        [ -f CONTRIBUTING.md ] && echo "✓ CONTRIBUTING.md exists" || exit 1
        [ -d docs ] && echo "✓ docs/ directory exists" || exit 1
        [ -d engine ] && echo "✓ engine/ directory exists" || exit 1
        echo "✅ Project structure validation passed!"
    
    - name: Check for large files
      run: |
        echo "Checking for unexpectedly large files..."
        find . -type f -size +10M ! -path "./.git/*" | while read file; do
          echo "⚠️  Large file detected: $file"
        done
    
    - name: Markdown lint check
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-quiet-mode: 'yes'
        use-verbose-mode: 'yes'
        config-file: '.github/markdown-link-check.json'
    
    - name: Success message
      if: success()
      run: echo "🎉 All tests passed! GENESIS project structure is valid."